<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Leviatán">
  <rect width="32" height="32" fill="#ffffff"/>

  <!-- corona: tres picos con orbs -->
  <g fill="#1d1d1f">
    <path d="M9.6 9.4 L11.2 5.4 L12.2 8.6 L16 4.2 L19.8 8.6 L20.8 5.4 L22.4 9.4 Z"/>
    <!-- aro de la corona -->
    <rect x="9.6" y="9.4" width="12.8" height="1.6"/>
  </g>

  <!-- orb central de la corona (acento Aqua) -->
  <circle cx="16" cy="3.6" r="1.2" fill="#0095b6"/>

  <!-- cabeza -->
  <ellipse cx="16" cy="15.6" rx="4" ry="4.6" fill="#1d1d1f"/>

  <!-- hombros / cuerpo del Leviatán (silueta) -->
  <path d="M5.6 28 Q5.6 21.6 9.6 21.2 L22.4 21.2 Q26.4 21.6 26.4 28 Z" fill="#1d1d1f"/>

  <!-- pequeños puntos en el cuerpo: sugieren los muchos que componen al Leviatán -->
  <g fill="#ffffff" opacity="0.42">
    <circle cx="10.2" cy="24" r="0.45"/>
    <circle cx="12.6" cy="25.4" r="0.45"/>
    <circle cx="15" cy="24" r="0.45"/>
    <circle cx="17.4" cy="25.4" r="0.45"/>
    <circle cx="19.8" cy="24" r="0.45"/>
    <circle cx="22" cy="25.4" r="0.45"/>
    <circle cx="11.4" cy="27" r="0.45"/>
    <circle cx="14" cy="27" r="0.45"/>
    <circle cx="16.6" cy="27" r="0.45"/>
    <circle cx="19.2" cy="27" r="0.45"/>
    <circle cx="21.6" cy="27" r="0.45"/>
  </g>
</svg>
